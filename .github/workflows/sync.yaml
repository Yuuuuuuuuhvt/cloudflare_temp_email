name: Upstream Sync

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream changes (exclude workflow files)
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/dreamhunter2333/cloudflare_temp_email.git
          git fetch origin main
          git fetch upstream main

          git checkout -B temp-sync upstream/main
          git checkout origin/main -- .github/workflows

          if ! git diff --quiet; then
            git add -A
            git commit -m "chore: sync upstream (exclude workflow files)"
          fi

          if ! git merge-base --is-ancestor origin/main HEAD; then
            echo "Refusing non-fast-forward sync to main. Please review fork-specific commits on main and resolve manually before re-running this workflow."
            exit 1
          fi

          git push origin HEAD:main
